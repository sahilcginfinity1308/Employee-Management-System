<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Registration - Employee Management System</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .form-container {
      background: #fff;
      border-radius: 8px;
      padding: 32px;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .form-container h2 {
      margin-bottom: 24px;
      font-size: 1.4rem;
      color: #2c3e50;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.95rem;
      color: #444;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #2c3e50;
    }

    .form-row {
      display: flex;
      gap: 16px;
    }

    .form-row .form-group {
      flex: 1;
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background-color: #2c3e50;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 8px;
    }

    .btn-submit:hover {
      background-color: #1a252f;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #2c3e50;
      text-decoration: none;
      font-size: 0.95rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>Employee Management System</h1>
    <p>Manage your workforce efficiently and effectively.</p>
  </header>

  <main>
    <a href="index.html" class="back-link">&larr; Back to Employee List</a>
    <div class="form-container">
      <h2>Employee Registration</h2>
      <form id="registrationForm">
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" placeholder="Enter first name" required />
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" placeholder="Enter last name" required />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter email address" required />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="Enter phone number" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="department">Department</label>
            <select id="department" name="department" required>
              <option value="" disabled selected>Select department</option>
              <option value="hr">Human Resources</option>
              <option value="engineering">Engineering</option>
              <option value="finance">Finance</option>
              <option value="marketing">Marketing</option>
              <option value="operations">Operations</option>
            </select>
          </div>
          <div class="form-group">
            <label for="role">Role</label>
            <select id="role" name="role" required>
              <option value="" disabled selected>Select role</option>
              <option value="intern">Intern</option>
              <option value="junior">Junior</option>
              <option value="senior">Senior</option>
              <option value="lead">Lead</option>
              <option value="manager">Manager</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="joiningDate">Joining Date</label>
          <input type="date" id="joiningDate" name="joiningDate" required />
        </div>

        <button type="submit" class="btn-submit">Register Employee</button>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Employee Management System</p>
  </footer>
</body>
</html>
